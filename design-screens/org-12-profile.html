<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>Wacca - プロフィール設定（主催者）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans JP', 'sans-serif'] },
          colors: {
            org: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412', 900: '#7c2d12' },
            neutral: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Sans JP', sans-serif; }
    body { width: 1440px; margin: 0 auto; background: #ffffff; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body class="bg-neutral-50">

  <!-- Header -->
  <header class="bg-white px-8 h-16 flex items-center justify-between border-b border-neutral-100 sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-org-500 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg>
      </div>
      <span class="text-lg font-bold text-neutral-900">Wacca</span>
      <span class="text-[10px] bg-org-100 text-org-700 px-2 rounded-full font-semibold inline-flex items-center justify-center h-5" style="line-height:1;">主催者</span>
    </div>
    <nav class="flex items-center gap-1">
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">ダッシュボード</a>
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">イベント管理</a>
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">出店者管理</a>
      <a class="text-sm font-medium text-org-700 bg-org-50 px-4 py-2 rounded-lg">プロフィール</a>
      <div class="w-px h-6 bg-neutral-200 mx-2"></div>
      <button class="text-sm text-neutral-400 hover:text-red-500 px-3 py-2">ログアウト</button>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto py-8 px-6">

    <!-- Page Title -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-neutral-900 mb-1">プロフィール設定</h1>
      <p class="text-sm text-neutral-500">主催者情報を管理します。出店者に公開される情報です。</p>
    </div>

    <!-- Two Column Layout -->
    <div class="flex gap-8">

      <!-- Left: Sidebar Nav -->
      <div class="w-56 shrink-0">
        <nav class="bg-white rounded-2xl border border-neutral-200 p-2">
          <a class="flex items-center gap-3 px-4 py-2.5 rounded-xl bg-org-50 text-org-700 text-sm font-semibold">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            基本情報
          </a>
          <a class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-neutral-500 hover:text-neutral-700 text-sm font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
            評価
          </a>
          <a class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-neutral-500 hover:text-neutral-700 text-sm font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            通知設定
          </a>
        </nav>
      </div>

      <!-- Right: Form Content -->
      <div class="flex-1">

        <!-- Profile Header Card -->
        <div class="bg-white rounded-2xl border border-neutral-200 p-6 mb-6">
          <div class="flex items-center gap-5">
            <!-- Avatar -->
            <div class="relative">
              <div class="w-20 h-20 bg-org-100 rounded-2xl flex items-center justify-center text-2xl font-bold text-org-700">株</div>
              <button class="absolute -bottom-1 -right-1 w-7 h-7 bg-org-500 rounded-lg flex items-center justify-center shadow-md">
                <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
              </button>
            </div>
            <div class="flex-1">
              <h2 class="text-lg font-bold text-neutral-900">株式会社イベントプロ</h2>
              <p class="text-sm text-neutral-500 mb-2">@eventpro</p>
              <div class="flex items-center gap-2">
                <span class="inline-flex items-center justify-center text-xs font-semibold bg-org-100 text-org-700 h-6 px-2.5 rounded-full" style="line-height:1;">認証済み</span>
                <span class="inline-flex items-center justify-center text-xs font-medium bg-neutral-100 text-neutral-600 h-6 px-2.5 rounded-full" style="line-height:1;">開催実績: 24回</span>
              </div>
            </div>
            <button class="text-sm font-semibold text-org-600 hover:text-org-800 bg-org-50 px-4 py-2 rounded-xl">画像を変更</button>
          </div>
        </div>

        <!-- Basic Info Form -->
        <div class="bg-white rounded-2xl border border-neutral-200 p-6 mb-6">
          <h3 class="text-base font-bold text-neutral-900 mb-5">基本情報</h3>

          <div class="space-y-5">
            <!-- Company Name -->
            <div>
              <label class="block text-sm font-medium text-neutral-700 mb-1.5">主催団体名 / 会社名</label>
              <input type="text" value="株式会社イベントプロ" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500">
            </div>

            <!-- Two columns -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-neutral-700 mb-1.5">代表者名 / 担当者名</label>
                <input type="text" value="山田 太郎" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-neutral-700 mb-1.5">電話番号</label>
                <input type="tel" value="03-1234-5678" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500">
              </div>
            </div>

            <!-- Email -->
            <div>
              <label class="block text-sm font-medium text-neutral-700 mb-1.5">メールアドレス</label>
              <input type="email" value="yamada@eventpro.co.jp" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500">
            </div>

            <!-- Address -->
            <div>
              <label class="block text-sm font-medium text-neutral-700 mb-1.5">所在地 <span class="text-neutral-400 font-normal">（任意）</span></label>
              <input type="text" value="東京都渋谷区神宮前3-25-18" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500">
            </div>

            <!-- Event Type -->
            <div>
              <label class="block text-sm font-medium text-neutral-700 mb-2">イベント種別 <span class="text-neutral-400 font-normal">（複数選択可）</span></label>
              <div class="flex flex-wrap gap-2">
                <span class="h-9 px-4 rounded-full text-sm font-medium cursor-pointer inline-flex items-center justify-center bg-org-500 text-white shadow-sm" style="line-height:1;">フードフェス</span>
                <span class="h-9 px-4 rounded-full text-sm font-medium cursor-pointer inline-flex items-center justify-center bg-org-50 text-org-700 border border-org-200" style="line-height:1;">マルシェ</span>
                <span class="h-9 px-4 rounded-full text-sm font-medium cursor-pointer inline-flex items-center justify-center bg-white text-neutral-600 border border-neutral-200 hover:border-neutral-300" style="line-height:1;">地域祭り</span>
                <span class="h-9 px-4 rounded-full text-sm font-medium cursor-pointer inline-flex items-center justify-center bg-white text-neutral-600 border border-neutral-200 hover:border-neutral-300" style="line-height:1;">企業イベント</span>
                <span class="h-9 px-4 rounded-full text-sm font-medium cursor-pointer inline-flex items-center justify-center bg-white text-neutral-600 border border-neutral-200 hover:border-neutral-300" style="line-height:1;">スポーツイベント</span>
              </div>
            </div>

            <!-- Event Scale -->
            <div>
              <label class="block text-sm font-medium text-neutral-700 mb-2">開催規模 <span class="text-neutral-400 font-normal">（任意・複数選択可）</span></label>
              <div class="flex flex-wrap gap-2">
                <span class="h-9 px-4 rounded-full text-sm font-medium cursor-pointer inline-flex items-center justify-center bg-org-500 text-white shadow-sm" style="line-height:1;">小規模（〜50店）</span>
                <span class="h-9 px-4 rounded-full text-sm font-medium cursor-pointer inline-flex items-center justify-center bg-white text-neutral-600 border border-neutral-200 hover:border-neutral-300" style="line-height:1;">中規模（50〜200店）</span>
                <span class="h-9 px-4 rounded-full text-sm font-medium cursor-pointer inline-flex items-center justify-center bg-white text-neutral-600 border border-neutral-200 hover:border-neutral-300" style="line-height:1;">大規模（200店〜）</span>
              </div>
            </div>

            <!-- Description -->
            <div>
              <label class="block text-sm font-medium text-neutral-700 mb-1.5">団体概要 <span class="text-neutral-400 font-normal">（任意）</span></label>
              <textarea rows="4" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500 resize-none">全国各地でフードフェスティバルやマルシェを主催しています。地域の食文化を盛り上げることをミッションに、年間20以上のイベントを企画・運営しています。</textarea>
              <p class="text-xs text-neutral-400 mt-1">200文字以内で記入してください</p>
            </div>
          </div>
        </div>

        <!-- Save Actions -->
        <div class="flex items-center justify-between">
          <p class="text-xs text-neutral-400">最終更新: 2026/03/14 10:20</p>
          <div class="flex items-center gap-3">
            <button class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-5 py-2.5 rounded-xl border border-neutral-200">キャンセル</button>
            <button class="text-sm font-semibold text-white bg-org-500 hover:bg-org-600 px-6 py-2.5 rounded-xl transition-colors">変更を保存</button>
          </div>
        </div>

      </div>
    </div>

  </main>

</body>
</html>
