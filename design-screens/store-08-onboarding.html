<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>Wacca - 出店者情報の登録</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans JP', 'sans-serif'] },
          colors: {
            store: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
            neutral: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Sans JP', sans-serif; }
    body { width: 1440px; margin: 0 auto; background: #ffffff; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <div class="min-h-screen relative overflow-hidden flex items-center justify-center" style="background: linear-gradient(135deg, #f8fafc 0%, #ecfdf5 50%, rgba(255,251,235,0.2) 100%);">
    <!-- Background decorations -->
    <div class="absolute -top-[120px] -left-[60px] w-[400px] h-[400px] rounded-full bg-store-200 opacity-15"></div>
    <div class="absolute -bottom-[100px] -right-[80px] w-[350px] h-[350px] rounded-full bg-store-300 opacity-10"></div>
    <div class="absolute top-[20%] right-[10%] w-[200px] h-[200px] rounded-full bg-amber-200 opacity-[0.08]"></div>
    <div class="absolute bottom-[15%] left-[8%] w-[160px] h-[160px] rounded-full bg-pink-200 opacity-[0.08]"></div>

    <!-- Floating dots -->
    <div class="absolute top-[10%] left-[15%] w-3.5 h-3.5 rounded-full bg-orange-400 opacity-50"></div>
    <div class="absolute top-[8%] right-[20%] w-2.5 h-2.5 rounded-full bg-pink-400 opacity-40"></div>
    <div class="absolute bottom-[12%] left-[25%] w-4 h-4 rounded-full bg-store-400 opacity-30"></div>
    <div class="absolute bottom-[20%] right-[15%] w-3 h-3 rounded-full bg-purple-400 opacity-35"></div>
    <div class="absolute top-[40%] left-[6%] w-2.5 h-2.5 rounded-full bg-amber-400 opacity-40"></div>
    <div class="absolute top-[55%] right-[8%] w-3.5 h-3.5 rounded-full bg-orange-400 opacity-30"></div>

    <!-- Card -->
    <div class="relative z-10 w-[520px] bg-white rounded-3xl shadow-[0_4px_6px_rgba(0,0,0,0.02),0_12px_40px_rgba(0,0,0,0.06)] px-11 py-10">
      <!-- Logo -->
      <div class="flex items-center justify-center gap-3 mb-6">
        <div class="w-11 h-11 bg-store-500 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg>
        </div>
        <span class="text-2xl font-bold text-neutral-900">Wacca</span>
        <span class="text-[10px] bg-store-100 text-store-700 px-2 rounded-full font-semibold inline-flex items-center justify-center h-5" style="line-height:1;">出店者</span>
      </div>

      <div class="space-y-6">
        <div class="text-center">
          <h2 class="text-[22px] font-bold text-neutral-900">出店者情報の登録</h2>
          <p class="text-sm text-neutral-500 mt-1.5">基本情報を入力して、アカウント設定を完了しましょう</p>
        </div>

        <div class="space-y-4">
          <!-- 店舗名 -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">店舗名 / 屋号</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-[18px] w-[18px] text-neutral-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h18v4H3zM3 7v13h18V7M7 7v13M17 7v13"/></svg>
              <input type="text" value="たこ焼き太郎" class="w-full rounded-xl border border-neutral-300 pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-store-500 focus:border-store-500 transition" />
            </div>
          </div>

          <!-- 代表者名 -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">代表者名</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-[18px] w-[18px] text-neutral-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <input type="text" value="田中 太郎" class="w-full rounded-xl border border-neutral-300 pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-store-500 focus:border-store-500 transition" />
            </div>
          </div>

          <!-- メールアドレス -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">メールアドレス</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-[18px] w-[18px] text-neutral-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              <input type="email" value="tanaka@example.com" class="w-full rounded-xl border border-neutral-300 pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-store-500 focus:border-store-500 transition" />
            </div>
          </div>

          <!-- 電話番号 -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">電話番号</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-[18px] w-[18px] text-neutral-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              <input type="tel" value="090-1234-5678" class="w-full rounded-xl border border-neutral-300 pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-store-500 focus:border-store-500 transition" />
            </div>
          </div>

          <!-- 住所 -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">住所</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-[18px] w-[18px] text-neutral-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <input type="text" value="東京都渋谷区神南1-2-3" class="w-full rounded-xl border border-neutral-300 pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-store-500 focus:border-store-500 transition" />
            </div>
          </div>

          <!-- ウェブサイト -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">ウェブサイト URL <span class="text-neutral-400 font-normal">（任意）</span></label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-[18px] w-[18px] text-neutral-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
              <input type="url" placeholder="https://..." class="w-full rounded-xl border border-neutral-300 pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-store-500 focus:border-store-500 transition placeholder:text-neutral-400" />
            </div>
          </div>

          <!-- お店の紹介 -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">お店の紹介</label>
            <textarea rows="3" class="w-full rounded-xl border border-neutral-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-store-500 focus:border-store-500 transition resize-none">本場大阪仕込みのたこ焼きを提供しています。外はカリッと、中はとろっとした食感が自慢です。</textarea>
          </div>

          <!-- 営業許可証 -->
          <div>
            <label class="block text-sm font-medium text-neutral-700 mb-1.5">
              <span class="flex items-center gap-1.5">
                <svg class="h-4 w-4 text-neutral-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                営業許可証
                <span class="text-neutral-400 font-normal">（後からプロフィールでも登録可）</span>
              </span>
            </label>
            <div class="flex flex-col items-center justify-center h-28 rounded-xl border-2 border-dashed border-neutral-300 hover:border-store-400 hover:bg-store-50/30 transition cursor-pointer">
              <svg class="w-7 h-7 text-neutral-300 mb-1.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
              <p class="text-sm text-neutral-500">クリックしてアップロード</p>
              <p class="text-xs text-neutral-400 mt-0.5">PNG, JPG, PDF（最大10MB）</p>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-2">
          <button class="w-full h-12 rounded-xl bg-store-500 hover:bg-store-600 text-white font-semibold text-sm shadow-lg shadow-store-500/25 transition inline-flex items-center justify-center gap-2">
            登録してダッシュボードへ
          </button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
