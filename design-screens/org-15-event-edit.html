<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>Wacca - イベント編集</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans JP', 'sans-serif'] },
          colors: {
            store: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
            org: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412', 900: '#7c2d12' },
            accent: { pink: '#ec4899', yellow: '#eab308', purple: '#8b5cf6', sky: '#0ea5e9' },
            neutral: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Sans JP', sans-serif; }
    body { width: 1440px; margin: 0 auto; background: #f8fafc; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Header -->
  <header class="bg-white px-8 h-16 flex items-center justify-between border-b border-neutral-100 sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-org-500 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg>
      </div>
      <span class="text-lg font-bold text-neutral-900">Wacca</span>
      <span class="text-[10px] bg-org-100 text-org-700 px-2 rounded-full font-semibold inline-flex items-center justify-center h-5" style="line-height:1;">主催者</span>
    </div>
    <nav class="flex items-center gap-1">
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">ダッシュボード</a>
      <a class="text-sm font-medium text-org-700 bg-org-50 px-4 py-2 rounded-lg">イベント管理</a>
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">出店者管理</a>
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">プロフィール</a>
      <div class="w-px h-6 bg-neutral-200 mx-2"></div>
      <button class="text-sm text-neutral-400 hover:text-red-500 px-3 py-2">ログアウト</button>
    </nav>
  </header>

  <main class="max-w-4xl mx-auto py-8 px-6">

    <!-- Back + Title -->
    <div class="mb-6">
      <a class="flex items-center text-sm font-medium text-neutral-500 hover:text-org-600 transition-colors mb-4 cursor-pointer">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        イベント詳細へ戻る
      </a>
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold text-neutral-900">イベントを編集</h1>
          <p class="text-sm text-neutral-500 mt-1">春の手作りマーケット 2026 の情報を編集します。</p>
        </div>
        <span class="h-6 inline-flex items-center justify-center text-xs font-semibold px-3 rounded-full bg-org-100 text-org-700" style="line-height:1;">募集中</span>
      </div>
    </div>

    <!-- Step Indicator -->
    <div class="mb-8 relative">
      <div class="absolute top-5 left-5 right-5 h-0.5 bg-neutral-200 z-0"></div>
      <div class="absolute top-5 left-5 right-5 h-0.5 bg-org-500 z-0" style="width: calc(25% * 1);"></div>
      <div class="relative z-10 flex justify-between">
        <div class="flex flex-col items-center gap-2">
          <div class="w-10 h-10 rounded-full bg-org-500 text-white flex items-center justify-center text-sm font-bold">1</div>
          <span class="text-xs font-semibold text-org-700">基本情報</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <div class="w-10 h-10 rounded-full bg-white border-2 border-neutral-300 text-neutral-400 flex items-center justify-center text-sm font-bold">2</div>
          <span class="text-xs font-medium text-neutral-400">開催詳細</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <div class="w-10 h-10 rounded-full bg-white border-2 border-neutral-300 text-neutral-400 flex items-center justify-center text-sm font-bold">3</div>
          <span class="text-xs font-medium text-neutral-400">出店者募集</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <div class="w-10 h-10 rounded-full bg-white border-2 border-neutral-300 text-neutral-400 flex items-center justify-center text-sm font-bold">4</div>
          <span class="text-xs font-medium text-neutral-400">画像・書類</span>
        </div>
        <div class="flex flex-col items-center gap-2">
          <div class="w-10 h-10 rounded-full bg-white border-2 border-neutral-300 text-neutral-400 flex items-center justify-center text-sm font-bold">5</div>
          <span class="text-xs font-medium text-neutral-400">確認・公開</span>
        </div>
      </div>
    </div>

    <!-- Step 1: 基本情報 -->
    <div class="bg-white rounded-2xl border border-neutral-200 p-8 mb-6">
      <h2 class="text-lg font-bold text-neutral-900 mb-6">基本情報</h2>

      <div class="space-y-5">
        <!-- Event Name -->
        <div>
          <label class="text-sm font-semibold text-neutral-700 block mb-1.5">イベント名 <span class="text-red-500">*</span></label>
          <input type="text" value="春の手作りマーケット 2026" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500" />
        </div>

        <!-- Lead Text -->
        <div>
          <label class="text-sm font-semibold text-neutral-700 block mb-1.5">リード文（一覧表示用の短い説明）</label>
          <input type="text" value="春の陽気の中、手作り作品や食のマーケットを開催します。" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500" />
          <p class="text-xs text-neutral-400 mt-1">100文字以内</p>
        </div>

        <!-- Description -->
        <div>
          <label class="text-sm font-semibold text-neutral-700 block mb-1.5">イベント詳細説明 <span class="text-red-500">*</span></label>
          <textarea rows="4" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500 resize-none">春の陽気の中、代々木公園にて手作りマーケットを開催します。アクセサリー・雑貨・スイーツ・飲食など幅広いジャンルで出店者を募集しています。初めての方もお気軽にご応募ください。</textarea>
        </div>

        <!-- Category -->
        <div>
          <label class="text-sm font-semibold text-neutral-700 block mb-1.5">カテゴリ</label>
          <div class="flex flex-wrap gap-2">
            <button class="px-3 py-1.5 text-xs font-medium rounded-full bg-org-500 text-white">マルシェ</button>
            <button class="px-3 py-1.5 text-xs font-medium rounded-full border border-neutral-200 text-neutral-600 hover:bg-neutral-50">クラフト</button>
            <button class="px-3 py-1.5 text-xs font-medium rounded-full border border-neutral-200 text-neutral-600 hover:bg-neutral-50">フード</button>
            <button class="px-3 py-1.5 text-xs font-medium rounded-full border border-neutral-200 text-neutral-600 hover:bg-neutral-50">アート</button>
            <button class="px-3 py-1.5 text-xs font-medium rounded-full border border-neutral-200 text-neutral-600 hover:bg-neutral-50">音楽</button>
            <button class="px-3 py-1.5 text-xs font-medium rounded-full border border-neutral-200 text-neutral-600 hover:bg-neutral-50">その他</button>
          </div>
        </div>

        <!-- Date Range -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold text-neutral-700 block mb-1.5">開催開始日 <span class="text-red-500">*</span></label>
            <input type="date" value="2026-04-12" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500" />
          </div>
          <div>
            <label class="text-sm font-semibold text-neutral-700 block mb-1.5">開催終了日</label>
            <input type="date" value="2026-04-13" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500" />
          </div>
        </div>

        <!-- Venue -->
        <div>
          <label class="text-sm font-semibold text-neutral-700 block mb-1.5">会場名</label>
          <input type="text" value="代々木公園 イベント広場" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500" />
        </div>

        <!-- Address -->
        <div>
          <label class="text-sm font-semibold text-neutral-700 block mb-1.5">住所</label>
          <input type="text" value="東京都渋谷区代々木神園町2-1" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500" />
        </div>

        <!-- Capacity + Fee -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold text-neutral-700 block mb-1.5">定員（出店者数）</label>
            <input type="number" value="50" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500" />
          </div>
          <div>
            <label class="text-sm font-semibold text-neutral-700 block mb-1.5">出店料</label>
            <input type="text" value="5,000円/日" class="w-full border border-neutral-200 rounded-xl px-4 py-2.5 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-org-500 focus:border-org-500" />
          </div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex items-center justify-between">
      <div class="flex gap-3">
        <button class="px-5 py-2.5 text-sm font-medium border border-neutral-200 text-neutral-600 rounded-xl hover:bg-neutral-50 transition-colors">下書き保存</button>
        <button class="px-5 py-2.5 text-sm font-medium border border-red-200 text-red-500 rounded-xl hover:bg-red-50 transition-colors">削除</button>
      </div>
      <button class="inline-flex items-center gap-2 bg-org-500 hover:bg-org-600 text-white font-medium rounded-xl px-6 py-2.5 text-sm transition-colors">
        次へ: 開催詳細
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>

  </main>

</body>
</html>
