<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>Wacca Store - Login v2</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f8fafc; color: #0f172a; -webkit-font-smoothing: antialiased; }

    :root {
      --store-50: #ecfdf5; --store-100: #d1fae5; --store-200: #a7f3d0;
      --store-300: #6ee7b7; --store-400: #34d399; --store-500: #10b981;
      --store-600: #059669; --store-700: #047857; --store-800: #065f46;
      --store-900: #064e3b;
    }

    .page {
      width: 1440px; min-height: 900px; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, var(--store-50) 40%, rgba(209,250,229,0.3) 70%, rgba(255,251,235,0.2) 100%);
    }

    /* Background decorations */
    .bg-deco { position: absolute; border-radius: 50%; }
    .bg-d1 { top: -120px; left: -60px; width: 400px; height: 400px; background: var(--store-200); opacity: 0.15; }
    .bg-d2 { bottom: -100px; right: -80px; width: 350px; height: 350px; background: var(--store-300); opacity: 0.1; }
    .bg-d3 { top: 20%; right: 10%; width: 200px; height: 200px; background: #fde68a; opacity: 0.08; }
    .bg-d4 { bottom: 15%; left: 8%; width: 160px; height: 160px; background: #fbcfe8; opacity: 0.08; }

    .dot { position: absolute; border-radius: 50%; }
    .dot1 { top: 10%; left: 15%; width: 14px; height: 14px; background: #fb923c; opacity: 0.5; }
    .dot2 { top: 8%; right: 20%; width: 10px; height: 10px; background: #f472b6; opacity: 0.4; }
    .dot3 { bottom: 12%; left: 25%; width: 16px; height: 16px; background: var(--store-400); opacity: 0.3; }
    .dot4 { bottom: 20%; right: 15%; width: 12px; height: 12px; background: #a78bfa; opacity: 0.35; }
    .dot5 { top: 40%; left: 6%; width: 10px; height: 10px; background: #fbbf24; opacity: 0.4; }
    .dot6 { top: 55%; right: 8%; width: 14px; height: 14px; background: #fb923c; opacity: 0.3; }

    /* Card */
    .card {
      position: relative; z-index: 10; width: 480px;
      background: #fff; border-radius: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02), 0 12px 40px rgba(0,0,0,0.06);
      padding: 48px 44px;
    }

    /* Logo */
    .logo-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
    .logo-icon { width: 44px; height: 44px; background: var(--store-600); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-size: 24px; font-weight: 700; color: var(--store-800); }

    .form-heading { text-align: center; font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
    .form-subheading { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 28px; }

    /* Social buttons */
    .social-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .btn-social {
      width: 100%; height: 48px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; gap: 12px;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
      border: 1px solid #e2e8f0; background: #fff; color: #334155;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .btn-social:hover { background: #f8fafc; }
    .btn-line { background: #06C755; color: #fff; border-color: transparent; }
    .btn-line:hover { opacity: 0.9; background: #06C755; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .divider-line { flex: 1; height: 1px; background: #e2e8f0; }
    .divider-text { font-size: 12px; color: #94a3b8; font-weight: 500; }

    /* Form */
    .field { margin-bottom: 16px; }
    .field-label { display: block; font-size: 14px; font-weight: 500; color: #334155; margin-bottom: 6px; }
    .field-input {
      width: 100%; height: 48px; padding: 0 16px; border-radius: 12px;
      border: 1px solid #e2e8f0; background: #f8fafc; font-size: 14px;
      outline: none; transition: all 0.15s; color: #0f172a;
    }
    .field-input::placeholder { color: #94a3b8; }
    .field-input:focus { border-color: transparent; box-shadow: 0 0 0 2px var(--store-500); }

    .forgot-row { display: flex; justify-content: flex-end; padding-top: 4px; margin-bottom: 16px; }
    .forgot-link { font-size: 13px; color: var(--store-600); font-weight: 500; text-decoration: none; }
    .forgot-link:hover { color: var(--store-700); }

    .btn-submit {
      width: 100%; height: 48px; border-radius: 12px; border: none;
      background: var(--store-600); color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
      box-shadow: 0 4px 12px rgba(5,150,105,0.25);
      margin-bottom: 24px;
    }
    .btn-submit:hover { background: var(--store-700); }

    .signup-link-row { text-align: center; font-size: 14px; color: #64748b; }
    .signup-link-row a { color: var(--store-600); font-weight: 600; text-decoration: none; margin-left: 4px; }
    .signup-link-row a:hover { color: var(--store-700); }
  </style>
</head>
<body>
  <div class="page">
    <!-- Background decorations -->
    <div class="bg-deco bg-d1"></div>
    <div class="bg-deco bg-d2"></div>
    <div class="bg-deco bg-d3"></div>
    <div class="bg-deco bg-d4"></div>
    <div class="dot dot1"></div>
    <div class="dot dot2"></div>
    <div class="dot dot3"></div>
    <div class="dot dot4"></div>
    <div class="dot dot5"></div>
    <div class="dot dot6"></div>

    <!-- Login Card -->
    <div class="card">
      <div class="logo-row">
        <div class="logo-icon">
          <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/>
          </svg>
        </div>
        <span class="logo-text">Wacca</span>
      </div>

      <h2 class="form-heading">おかえりなさい</h2>
      <p class="form-subheading">出店者アカウントにログイン</p>

      <div class="social-buttons">
        <button class="btn-social" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleでログイン
        </button>
        <button class="btn-social btn-line" type="button">
          <svg width="20" height="20" fill="white" viewBox="0 0 24 24">
            <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596a.626.626 0 01-.199.031c-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
          </svg>
          LINEでログイン
        </button>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">または</span>
        <div class="divider-line"></div>
      </div>

      <form>
        <div class="field">
          <label class="field-label">メールアドレス</label>
          <input class="field-input" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label class="field-label">パスワード</label>
          <input class="field-input" type="password" placeholder="********" />
        </div>

        <div class="forgot-row">
          <a href="#" class="forgot-link">パスワードを忘れた方</a>
        </div>

        <button type="button" class="btn-submit">ログイン</button>
      </form>

      <p class="signup-link-row">
        アカウントをお持ちでない方<a href="#">新規登録</a>
      </p>
    </div>
  </div>
</body>
</html>
