<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>Wacca - 主催者詳細</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Noto Sans JP', 'sans-serif'] },
          colors: {
            store: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
            org: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c', 800: '#9a3412', 900: '#7c2d12' },
            accent: { pink: '#ec4899', yellow: '#eab308', purple: '#8b5cf6', sky: '#0ea5e9' },
            neutral: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Sans JP', sans-serif; }
    body { width: 1440px; margin: 0 auto; background: #ffffff; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body class="bg-neutral-50">

  <!-- Header -->
  <header class="bg-white px-8 h-16 flex items-center justify-between border-b border-neutral-100 sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-store-500 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg>
      </div>
      <span class="text-lg font-bold text-neutral-900">Wacca</span>
      <span class="text-[10px] bg-store-100 text-store-700 px-2 rounded-full font-semibold inline-flex items-center justify-center h-5" style="line-height:1;">出店者</span>
    </div>
    <nav class="flex items-center gap-1">
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">ホーム</a>
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">イベント検索</a>
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">申込管理</a>
      <a class="text-sm font-medium text-neutral-500 hover:text-neutral-700 px-4 py-2 rounded-lg">プロフィール</a>
      <div class="w-px h-6 bg-neutral-200 mx-2"></div>
      <button class="text-sm text-neutral-400 hover:text-red-500 px-3 py-2">ログアウト</button>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto py-8 px-6">

    <!-- Back Button -->
    <div class="mb-6">
      <a class="inline-flex items-center text-sm text-neutral-500 font-medium">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
        イベント一覧へ戻る
      </a>
    </div>

    <!-- Organizer Profile Card -->
    <div class="bg-white rounded-3xl shadow-sm border border-neutral-100 overflow-hidden">
      <!-- Header Section -->
      <div class="bg-gradient-to-r from-orange-50 to-store-50 px-8 py-12 border-b border-neutral-100">
        <div class="flex items-center gap-6">
          <div class="w-20 h-20 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-600 font-bold text-3xl shadow-lg">
            F
          </div>
          <div>
            <h1 class="text-3xl font-extrabold text-neutral-900 mb-2">フードパーク株式会社</h1>
            <p class="text-neutral-600 font-medium">田中 太郎</p>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="p-8 space-y-6">
        <!-- Contact Information -->
        <section>
          <h2 class="text-xl font-bold text-neutral-900 mb-4 flex items-center gap-2">
            <span class="w-1.5 h-6 bg-orange-500 rounded-full"></span>
            連絡先情報
          </h2>
          <div class="grid grid-cols-2 gap-4">
            <div class="flex items-start gap-4 p-4 bg-neutral-50 rounded-xl border border-neutral-100">
              <div class="w-10 h-10 rounded-full bg-store-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-store-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              </div>
              <div>
                <p class="text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">メールアドレス</p>
                <p class="text-store-600 font-medium">tanaka@foodpark.co.jp</p>
              </div>
            </div>
            <div class="flex items-start gap-4 p-4 bg-neutral-50 rounded-xl border border-neutral-100">
              <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              </div>
              <div>
                <p class="text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">電話番号</p>
                <p class="text-blue-600 font-medium">03-1234-5678</p>
              </div>
            </div>
          </div>
        </section>

        <!-- SNS / Website -->
        <section>
          <h2 class="text-xl font-bold text-neutral-900 mb-4 flex items-center gap-2">
            <span class="w-1.5 h-6 bg-orange-500 rounded-full"></span>
            SNS・ウェブサイト
          </h2>
          <div class="grid grid-cols-2 gap-4">
            <div class="flex items-center gap-4 p-4 bg-neutral-50 rounded-xl border border-neutral-100">
              <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
              </div>
              <div>
                <p class="text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">ウェブサイト</p>
                <p class="text-purple-600 font-medium">https://foodpark.co.jp</p>
              </div>
            </div>
            <div class="flex items-center gap-4 p-4 bg-neutral-50 rounded-xl border border-neutral-100">
              <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
              </div>
              <div>
                <p class="text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">Instagram</p>
                <p class="text-purple-600 font-medium">@foodpark_official</p>
              </div>
            </div>
          </div>
        </section>

        <!-- Additional Info -->
        <section>
          <h2 class="text-xl font-bold text-neutral-900 mb-4 flex items-center gap-2">
            <span class="w-1.5 h-6 bg-orange-500 rounded-full"></span>
            その他の情報
          </h2>
          <div class="grid grid-cols-2 gap-4">
            <div class="flex items-start gap-4 p-4 bg-neutral-50 rounded-xl border border-neutral-100">
              <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-pink-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              </div>
              <div>
                <p class="text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">担当者</p>
                <p class="text-neutral-900 font-medium">田中 太郎</p>
              </div>
            </div>
            <div class="flex items-start gap-4 p-4 bg-neutral-50 rounded-xl border border-neutral-100">
              <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
              </div>
              <div>
                <p class="text-xs font-bold text-neutral-400 uppercase tracking-wider mb-1">会社名</p>
                <p class="text-neutral-900 font-medium">フードパーク株式会社</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

</body>
</html>
